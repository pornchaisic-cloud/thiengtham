name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
        env:
          PUBLIC_FB_ACCESS_TOKEN: ${{ secrets.PUBLIC_FB_ACCESS_TOKEN }}
      - name: Debug auth
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          echo "Token length: ${#CF_API_TOKEN}"
          echo "Account id length: ${#CF_ACCOUNT_ID}"
          npx --yes wrangler --version
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        env:
          WRANGLER_LOG: debug
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy dist --project-name=thiengtham --log-level=debug --commit-dirty=true
