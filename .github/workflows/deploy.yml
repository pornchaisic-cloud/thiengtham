name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
        env:
          PUBLIC_FB_ACCESS_TOKEN: ${{ secrets.PUBLIC_FB_ACCESS_TOKEN }}
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          # Pin wrangler to a known-good version. Do NOT use @latest — wrangler 4.109.0
          # broke auth flow with CLOUDFLARE_API_TOKEN env var (silent exit 1).
          WRANGLER_VERSION="4.103.0"
          echo "Using wrangler@${WRANGLER_VERSION}"
          # --branch=main required to deploy to production (thiengtham.pages.dev /
          # thiengtham.com). Without it, wrangler pages deploy sends the upload to
          # a per-commit preview URL and production never receives the new code.
          set -o pipefail
          if ! npx --yes "wrangler@${WRANGLER_VERSION}" pages deploy dist \
               --project-name=thiengtham \
               --branch=main \
               --commit-dirty=true 2>&1 | tee /tmp/wrangler-deploy.log; then
            echo "--- wrangler FAILED — aborting CI ---"
            exit 1
          fi
          echo "--- deploy OK ---"
