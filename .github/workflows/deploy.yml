name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
        env:
          PUBLIC_FB_ACCESS_TOKEN: ${{ secrets.PUBLIC_FB_ACCESS_TOKEN }}
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          echo "Using wrangler@$(npx --yes wrangler@latest --version 2>/dev/null || echo 'unknown')"
          # --branch=main required to deploy to production (thiengtham.pages.dev /
          # thiengtham.com). Without it, wrangler pages deploy sends the upload to
          # a per-commit preview URL and production never receives the new code.
          npx --yes wrangler@latest pages deploy dist \
            --project-name=thiengtham \
            --branch=main \
            --commit-dirty=true 2>&1 | tee /tmp/wrangler-deploy.log
          echo "--- deploy exit code: ${PIPESTATUS[0]} ---"
          echo "--- wrangler log (last 40 lines) ---"
          tail -n 40 /tmp/wrangler-deploy.log || true
