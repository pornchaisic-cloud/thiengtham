name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
        env:
          PUBLIC_FB_ACCESS_TOKEN: ${{ secrets.PUBLIC_FB_ACCESS_TOKEN }}
      - name: Debug auth
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          echo "Token length: ${#CF_API_TOKEN}"
          echo "Account id length: ${#CF_ACCOUNT_ID}"
          npx --yes wrangler@latest --version || true
          # Plain wrangler deploy step (bypassing wrangler-action@v3 which
          # was hiding the real error as a generic exit 1)
          echo "--- Attempting direct wrangler pages deploy ---"
          npx --yes wrangler@latest pages deploy dist \
            --project-name=thiengtham \
            --commit-dirty=true \
            --log-level=debug 2>&1 || true
          echo "--- exit code captured above ---"
