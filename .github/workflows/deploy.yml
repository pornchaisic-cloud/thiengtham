name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
        env:
          PUBLIC_FB_ACCESS_TOKEN: ${{ secrets.PUBLIC_FB_ACCESS_TOKEN }}
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          echo "Using wrangler@$(npx --yes wrangler@latest --version 2>/dev/null || echo 'unknown')"
          echo "Deploying to project=thiengtham branch=main"
          npx --yes wrangler@latest pages deploy dist \
            --project-name=thiengtham \
            --branch=main \
            --commit-dirty=true \
            --skip-caching 2>&1
          echo "--- deploy exit code: $? ---"
