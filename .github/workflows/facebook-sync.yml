name: Fetch Facebook Posts

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-posts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch latest Facebook posts
        run: |
          mkdir -p src/data
          curl -s "https://graph.facebook.com/v22.0/ThiengTham.DEV/posts?fields=message,full_picture,permalink_url&limit=6&access_token=${{ secrets.FB_PAGE_TOKEN }}" -o src/data/posts.json
      - name: Commit and push if changed
        run: |
          git config user.name "Thiengtham Bot"
          git config user.email "bot@thiengtham.dev"
          git add src/data/posts.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto: sync Facebook posts" && git push)
